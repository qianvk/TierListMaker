name: Platform Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: installers-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  package:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cpack_generator: DragNDrop
            artifact_name: TierListMaker-macOS
            artifact_glob: dist/*.dmg
          - os: windows-latest
            cpack_generator: NSIS
            artifact_name: TierListMaker-Windows
            artifact_glob: dist/*.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      HAS_MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_BASE64 != '' }}
      HAS_MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY_BASE64 != '' }}
      HAS_WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN != '' && secrets.SUBMODULE_TOKEN || github.token }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.1'
          cache: true

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Resolve package version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.1.0-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "TLM_PACKAGE_VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && env.HAS_MACOS_CERTIFICATE == 'true'
        shell: bash
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          certificate_path="${RUNNER_TEMP}/tierlistmaker-signing.p12"
          keychain_path="${RUNNER_TEMP}/tierlistmaker-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          printf '%s' "${MACOS_CERTIFICATE_BASE64}" | base64 --decode > "${certificate_path}"
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" -P "${MACOS_CERTIFICATE_PASSWORD}" \
            -A -t cert -f pkcs12 -k "${keychain_path}"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "${keychain_password}" "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}"
          echo "MACOS_SIGNING_KEYCHAIN=${keychain_path}" >> "${GITHUB_ENV}"

      - name: Import Windows signing certificate
        if: runner.os == 'Windows' && env.HAS_WINDOWS_CERTIFICATE == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP 'tierlistmaker-signing.pfx'
          [IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          "WINDOWS_CERTIFICATE_PATH=$certificatePath" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: bash
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          signing_identity=""
          if [[ "${RUNNER_OS}" == "macOS" && "${HAS_MACOS_CERTIFICATE}" == "true" ]]; then
            signing_identity="${MACOS_SIGNING_IDENTITY}"
          fi
          cmake -S . -B build/package -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTLM_BUILD_TESTS=ON \
            "-DTLM_PACKAGE_VERSION=${TLM_PACKAGE_VERSION}" \
            "-DTLM_MACOS_CODESIGN_IDENTITY=${signing_identity}"

      - name: Build
        run: cmake --build build/package --parallel

      - name: Test
        run: ctest --test-dir build/package --output-on-failure

      - name: Sign Windows application
        if: runner.os == 'Windows' && env.HAS_WINDOWS_CERTIFICATE == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $signTool = Get-ChildItem `
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1
          if (-not $signTool) { throw 'signtool.exe was not found' }
          & $signTool.FullName sign /fd SHA256 /td SHA256 `
            /tr https://timestamp.digicert.com `
            /f $env:WINDOWS_CERTIFICATE_PATH `
            /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            build/package/TierListMaker.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package
        run: >-
          cpack --config build/package/CPackConfig.cmake
          -G ${{ matrix.cpack_generator }}
          -B dist

      - name: Audit Windows runtime payload
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --install build/package --prefix "${{ github.workspace }}/runtime-audit"
          $forbidden = @(
            'd3dcompiler_47.dll',
            'dxcompiler.dll',
            'dxil.dll',
            'opengl32sw.dll',
            'vc_redist.x64.exe'
          )
          $unexpected = Get-ChildItem runtime-audit -Recurse -File |
            Where-Object { $forbidden -contains $_.Name.ToLowerInvariant() }
          if ($unexpected) {
            throw "Forbidden deployment dependencies: $($unexpected.Name -join ', ')"
          }
          $required = @(
            'msvcp140.dll',
            'msvcp140_1.dll',
            'msvcp140_2.dll',
            'vcruntime140.dll',
            'vcruntime140_1.dll'
          )
          foreach ($name in $required) {
            if (-not (Test-Path "runtime-audit/bin/$name")) {
              throw "Missing required MSVC runtime: $name"
            }
          }

      - name: Sign Windows installer
        if: runner.os == 'Windows' && env.HAS_WINDOWS_CERTIFICATE == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $signTool = Get-ChildItem `
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1
          $installer = Get-ChildItem dist/*.exe | Select-Object -First 1
          & $signTool.FullName sign /fd SHA256 /td SHA256 `
            /tr https://timestamp.digicert.com `
            /f $env:WINDOWS_CERTIFICATE_PATH `
            /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            $installer.FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Notarize macOS disk image
        if: >-
          runner.os == 'macOS' &&
          env.HAS_MACOS_CERTIFICATE == 'true' &&
          env.HAS_MACOS_NOTARY_KEY == 'true'
        shell: bash
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          key_path="${RUNNER_TEMP}/AuthKey_${MACOS_NOTARY_KEY_ID}.p8"
          printf '%s' "${MACOS_NOTARY_KEY_BASE64}" | base64 --decode > "${key_path}"
          dmg_path="$(find dist -maxdepth 1 -name '*.dmg' -print -quit)"
          codesign --force --timestamp --sign "${MACOS_SIGNING_IDENTITY}" "${dmg_path}"
          xcrun notarytool submit "${dmg_path}" \
            --key "${key_path}" \
            --key-id "${MACOS_NOTARY_KEY_ID}" \
            --issuer "${MACOS_NOTARY_ISSUER_ID}" \
            --wait
          xcrun stapler staple "${dmg_path}"

      - name: Generate checksum
        shell: bash
        run: |
          artifact="$(find dist -maxdepth 1 \( -name '*.dmg' -o -name '*.exe' \) -print -quit)"
          cmake -E sha256sum "${artifact}" > "${artifact}.sha256"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_glob }}
            ${{ matrix.artifact_glob }}.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Remove temporary signing material
        if: always()
        shell: bash
        run: |
          rm -f "${RUNNER_TEMP}/tierlistmaker-signing.p12" \
            "${RUNNER_TEMP}/tierlistmaker-signing.pfx" \
            "${RUNNER_TEMP}"/AuthKey_*.p8
          if [[ -n "${MACOS_SIGNING_KEYCHAIN:-}" ]]; then
            security delete-keychain "${MACOS_SIGNING_KEYCHAIN}"
          fi

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Download installers
        uses: actions/download-artifact@v5
        with:
          pattern: TierListMaker-*
          path: release-assets
          merge-multiple: true

      - name: Generate update manifest
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          channel="stable"
          if [[ "${version}" == *-* ]]; then
            channel="beta"
          fi
          windows_path="$(find release-assets -maxdepth 1 -name '*-Windows-*.exe' -print -quit)"
          macos_path="$(find release-assets -maxdepth 1 -name '*-Darwin-*.dmg' -print -quit)"
          test -n "${windows_path}" && test -n "${macos_path}"

          windows_name="$(basename "${windows_path}")"
          macos_name="$(basename "${macos_path}")"
          windows_sha="$(shasum -a 256 "${windows_path}" | cut -d ' ' -f 1)"
          macos_sha="$(shasum -a 256 "${macos_path}" | cut -d ' ' -f 1)"
          windows_size="$(stat -f '%z' "${windows_path}")"
          macos_size="$(stat -f '%z' "${macos_path}")"
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          asset_root="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          jq -n \
            --arg channel "${channel}" \
            --arg version "${version}" \
            --arg release_url "${release_url}" \
            --arg asset_root "${asset_root}" \
            --arg windows_name "${windows_name}" \
            --arg windows_sha "${windows_sha}" \
            --argjson windows_size "${windows_size}" \
            --arg macos_name "${macos_name}" \
            --arg macos_sha "${macos_sha}" \
            --argjson macos_size "${macos_size}" \
            '{
              "schema-version": 1,
              channel: $channel,
              updates: {
                windows: {
                  "latest-version": $version,
                  "download-url": ($asset_root + "/" + $windows_name),
                  "release-url": $release_url,
                  "file-name": $windows_name,
                  sha256: $windows_sha,
                  size: $windows_size
                },
                macos: {
                  "latest-version": $version,
                  "download-url": ($asset_root + "/" + $macos_name),
                  "release-url": $release_url,
                  "file-name": $macos_name,
                  sha256: $macos_sha,
                  size: $macos_size
                }
              }
            }' > release-assets/updates.json

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_flags=()
          if [[ "${GITHUB_REF_NAME#v}" == *-* ]]; then
            release_flags+=(--prerelease)
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
            gh release edit "${GITHUB_REF_NAME}" "${release_flags[@]}" \
              --title "TierListMaker ${GITHUB_REF_NAME}"
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --verify-tag \
              --generate-notes \
              "${release_flags[@]}" \
              --title "TierListMaker ${GITHUB_REF_NAME}"
