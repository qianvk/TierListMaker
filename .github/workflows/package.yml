name: Platform Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cpack_generator: DragNDrop
            artifact_name: TierListMaker-macOS
            artifact_glob: dist/*.dmg
          - os: windows-latest
            cpack_generator: NSIS
            artifact_name: TierListMaker-Windows
            artifact_glob: dist/*.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN != '' && secrets.SUBMODULE_TOKEN || github.token }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          modules: 'qtsvg'
          cache: true

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Configure
        run: >-
          cmake -S . -B build/package -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DTLM_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build/package --parallel

      - name: Test
        run: ctest --test-dir build/package --output-on-failure

      - name: Package
        run: >-
          cpack --config build/package/CPackConfig.cmake
          -G ${{ matrix.cpack_generator }}
          -B dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      - name: Attach installer to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
