name: Platform Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: installers-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  package:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cpack_generator: DragNDrop
            artifact_name: TierListMaker-macOS
            artifact_glob: dist/*.dmg
          - os: windows-latest
            cpack_generator: NSIS
            artifact_name: TierListMaker-Windows
            artifact_glob: dist/*.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      HAS_MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_BASE64 != '' }}
      HAS_MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY_BASE64 != '' }}
      HAS_WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN != '' && secrets.SUBMODULE_TOKEN || github.token }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          cache: true

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Resolve package version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.1.0-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "TLM_PACKAGE_VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && env.HAS_MACOS_CERTIFICATE == 'true'
        shell: bash
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          certificate_path="${RUNNER_TEMP}/tierlistmaker-signing.p12"
          keychain_path="${RUNNER_TEMP}/tierlistmaker-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          printf '%s' "${MACOS_CERTIFICATE_BASE64}" | base64 --decode > "${certificate_path}"
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" -P "${MACOS_CERTIFICATE_PASSWORD}" \
            -A -t cert -f pkcs12 -k "${keychain_path}"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "${keychain_password}" "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}"
          echo "MACOS_SIGNING_KEYCHAIN=${keychain_path}" >> "${GITHUB_ENV}"

      - name: Import Windows signing certificate
        if: runner.os == 'Windows' && env.HAS_WINDOWS_CERTIFICATE == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP 'tierlistmaker-signing.pfx'
          [IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          "WINDOWS_CERTIFICATE_PATH=$certificatePath" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: bash
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          signing_identity=""
          if [[ "${RUNNER_OS}" == "macOS" && "${HAS_MACOS_CERTIFICATE}" == "true" ]]; then
            signing_identity="${MACOS_SIGNING_IDENTITY}"
          fi
          cmake -S . -B build/package -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTLM_BUILD_TESTS=ON \
            "-DTLM_PACKAGE_VERSION=${TLM_PACKAGE_VERSION}" \
            "-DTLM_MACOS_CODESIGN_IDENTITY=${signing_identity}"

      - name: Build
        run: cmake --build build/package --parallel

      - name: Test
        run: ctest --test-dir build/package --output-on-failure

      - name: Sign Windows application
        if: runner.os == 'Windows' && env.HAS_WINDOWS_CERTIFICATE == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $signTool = Get-ChildItem `
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1
          if (-not $signTool) { throw 'signtool.exe was not found' }
          & $signTool.FullName sign /fd SHA256 /td SHA256 `
            /tr https://timestamp.digicert.com `
            /f $env:WINDOWS_CERTIFICATE_PATH `
            /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            build/package/TierListMaker.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package
        run: >-
          cpack --config build/package/CPackConfig.cmake
          -G ${{ matrix.cpack_generator }}
          -B dist

      - name: Sign Windows installer
        if: runner.os == 'Windows' && env.HAS_WINDOWS_CERTIFICATE == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $signTool = Get-ChildItem `
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1
          $installer = Get-ChildItem dist/*.exe | Select-Object -First 1
          & $signTool.FullName sign /fd SHA256 /td SHA256 `
            /tr https://timestamp.digicert.com `
            /f $env:WINDOWS_CERTIFICATE_PATH `
            /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            $installer.FullName
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Notarize macOS disk image
        if: >-
          runner.os == 'macOS' &&
          env.HAS_MACOS_CERTIFICATE == 'true' &&
          env.HAS_MACOS_NOTARY_KEY == 'true'
        shell: bash
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          key_path="${RUNNER_TEMP}/AuthKey_${MACOS_NOTARY_KEY_ID}.p8"
          printf '%s' "${MACOS_NOTARY_KEY_BASE64}" | base64 --decode > "${key_path}"
          dmg_path="$(find dist -maxdepth 1 -name '*.dmg' -print -quit)"
          codesign --force --timestamp --sign "${MACOS_SIGNING_IDENTITY}" "${dmg_path}"
          xcrun notarytool submit "${dmg_path}" \
            --key "${key_path}" \
            --key-id "${MACOS_NOTARY_KEY_ID}" \
            --issuer "${MACOS_NOTARY_ISSUER_ID}" \
            --wait
          xcrun stapler staple "${dmg_path}"

      - name: Generate checksum
        shell: bash
        run: |
          artifact="$(find dist -maxdepth 1 \( -name '*.dmg' -o -name '*.exe' \) -print -quit)"
          cmake -E sha256sum "${artifact}" > "${artifact}.sha256"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_glob }}
            ${{ matrix.artifact_glob }}.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Remove temporary signing material
        if: always()
        shell: bash
        run: |
          rm -f "${RUNNER_TEMP}/tierlistmaker-signing.p12" \
            "${RUNNER_TEMP}/tierlistmaker-signing.pfx" \
            "${RUNNER_TEMP}"/AuthKey_*.p8
          if [[ -n "${MACOS_SIGNING_KEYCHAIN:-}" ]]; then
            security delete-keychain "${MACOS_SIGNING_KEYCHAIN}"
          fi

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: TierListMaker-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --verify-tag \
              --generate-notes \
              --title "TierListMaker ${GITHUB_REF_NAME}"
