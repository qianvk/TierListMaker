name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build and test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN != '' && secrets.SUBMODULE_TOKEN || github.token }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.1'
          cache: true

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DTLM_BUILD_TESTS=ON

      - name: Build
        shell: bash
        run: |
          set +e
          cmake --build build --config Release --parallel 2>&1 | tee build-output.log
          status=${PIPESTATUS[0]}
          set -e
          if [[ ${status} -ne 0 ]]; then
            summary="$(tail -n 80 build-output.log)"
            summary="${summary//'%'/'%25'}"
            summary="${summary//$'\r'/'%0D'}"
            summary="${summary//$'\n'/'%0A'}"
            echo "::error title=Native build failed::${summary}"
            exit "${status}"
          fi

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release
